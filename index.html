<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PB Mail Helper Pro</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ================= MAIN APP SHELL ================= -->
<div id="appShell" class="app-shell" role="application" aria-label="PB Mail Helper">

  <!-- Header -->
  <header class="app-header" id="appHeader">
    <div class="brand">
      <div class="brand-badge" aria-hidden="true">PB</div>
      <div class="brand-text">
        <h1>PB Mail Helper</h1>
        <span class="brand-sub">Fast insurance mail composer</span>
      </div>
    </div>

    <div class="header-actions">
      <button id="pipBtn" class="icon-btn" title="Float / Picture-in-Picture" aria-label="Float window">
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path fill="currentColor" d="M21 3H3a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h18a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2Zm0 16H3V5h18v14Zm-2-8h-8v6h8v-6Z"/></svg>
        <span>Float</span>
      </button>
      <button id="hideBtn" class="icon-btn" title="Hide to mini widget" aria-label="Hide">
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path fill="currentColor" d="M5 13h14v-2H5v2Z"/></svg>
        <span>Hide</span>
      </button>
      <button id="closeBtn" class="icon-btn danger" title="Close" aria-label="Close">
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path fill="currentColor" d="M19 6.4 17.6 5 12 10.6 6.4 5 5 6.4 10.6 12 5 17.6 6.4 19 12 13.4 17.6 19 19 17.6 13.4 12 19 6.4Z"/></svg>
      </button>
    </div>
  </header>

  <!-- Search -->
  <section class="search-section">
    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path fill="currentColor" d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 1 0-.7.7l.27.28v.79l5 5 1.49-1.49-5-5Zm-6 0A4.5 4.5 0 1 1 14 9.5 4.51 4.51 0 0 1 9.5 14Z"/></svg>
      <input type="text" id="searchInput" placeholder="Search mail... e.g. RF, refund, vahan, inspection" autocomplete="off" aria-label="Search mail templates" />
      <button id="clearSearchBtn" class="clear-search" aria-label="Clear search" style="display:none;">X</button>
    </div>
    <div id="resultsDropdown" class="results-dropdown" role="listbox" aria-label="Search results"></div>
  </section>

  <!-- Workspace -->
  <main class="workspace" id="workspace">

    <!-- LEFT: Controls -->
    <aside class="controls-pane" id="controlsPane">
      <div id="controlsEmpty" class="empty-state">
        <div class="empty-icon" aria-hidden="true">Mail</div>
        <h3>Select a mail template</h3>
        <p>Search above or pick from recent below.</p>
        <div id="quickTemplates" class="quick-templates"></div>
      </div>
      <div id="controlsContent" class="controls-content" style="display:none;">
        <div class="active-template-bar">
          <div>
            <div class="active-tpl-label">Active Template</div>
            <div class="active-tpl-header" id="activeTplHeader">-</div>
          </div>
          <button class="link-btn" id="changeTplBtn">Change</button>
        </div>
        <div id="dynamicControls"></div>
      </div>
    </aside>

    <!-- RIGHT: Preview -->
    <section class="preview-pane">
      <div class="preview-header">
        <span>Live Preview</span>
        <span class="preview-hint">Double-click to edit</span>
      </div>
      <div id="previewCard" class="preview-card" contenteditable="false" spellcheck="false" aria-label="Mail preview"></div>
    </section>

  </main>

  <!-- Footer actions -->
  <footer class="app-footer">
    <button id="resetBtn" class="btn ghost">Reset</button>
    <button id="copyBtn" class="btn primary" disabled>Copy Mail</button>
  </footer>
</div>

<!-- ================= MINI FLOATING WIDGET ================= -->
<div id="miniWidget" class="mini-widget" style="display:none;" role="button" tabindex="0" aria-label="Restore PB Mail Helper" title="Click to restore">
  <span class="mini-text">Open Remarks</span>
</div>

<!-- ================= REOPEN LAUNCHER (after close) ================= -->
<div id="reopenLauncher" class="reopen-launcher" style="display:none;" role="button" tabindex="0" aria-label="Reopen PB Mail Helper" title="Reopen PB Mail Helper">
  <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path fill="currentColor" d="M20 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2Zm0 4-8 5-8-5V6l8 5 8-5v2Z"/></svg>
</div>

<!-- Toast -->
<div id="toast" class="toast" role="status" aria-live="polite"></div>

<script src="script.js" defer></script>
</body>
</html>
